<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GamePad — Virtual Controller</title>
  <meta name="description" content="Turn any mobile device into a gamepad controller.">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>

  <!-- ==========================================
       TOP TOOLBAR
       ========================================== -->
  <header class="toolbar">
    <div class="toolbar-brand">
      <span class="logo">GAMEPAD</span>
    </div>

    <div id="connection-badge" class="connection-badge disconnected">
      <span class="connection-text">OFF</span>
      <span id="latency-value" class="latency-badge">--</span>
    </div>

    <div class="toolbar-divider"></div>

    <button id="btn-play" class="tb-btn active">PLAY</button>
    <button id="btn-edit" class="tb-btn">EDIT</button>

    <div class="toolbar-divider edit-only hidden"></div>

    <button id="btn-add-control" class="tb-btn tb-btn-primary edit-only hidden">+ ADD</button>
    <button id="btn-undo" class="tb-btn edit-only hidden">UNDO</button>
    <button id="btn-redo" class="tb-btn edit-only hidden">REDO</button>
    <button id="btn-save" class="tb-btn tb-btn-primary edit-only hidden">SAVE</button>

    <div class="toolbar-spacer"></div>

    <button id="btn-settings" class="tb-btn">SET</button>
  </header>

  <!-- Cog toggle for mobile -->
  <button id="btn-cog" class="cog-btn">&#9881;</button>

  <!-- ==========================================
       WORKSPACE
       ========================================== -->
  <main class="workspace-container">
    <div id="workspace-grid" class="workspace-grid"></div>
    <div id="workspace" class="workspace play-mode">
    </div>

    <!-- Properties Panel -->
    <aside id="properties-panel" class="properties-panel">
      <div class="panel-header">
        <span class="panel-title">PROPERTIES</span>
        <button id="prop-close" class="modal-close">X</button>
      </div>
      <div class="panel-body">
        <div class="panel-section">
          <div class="form-group">
            <label class="form-label" for="prop-name">Label</label>
            <input type="text" id="prop-name" class="form-input" placeholder="A, B, X, Y...">
          </div>
          <div class="form-group">
            <label class="form-label" for="prop-keybind">Key</label>
            <select id="prop-keybind" class="form-select">
              <option value="">None</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="prop-control-type">Type</label>
            <select id="prop-control-type" class="form-select" disabled>
              <option value="button">Button</option>
              <option value="analog_stick">Analog Stick</option>
              <option value="trigger">Trigger</option>
            </select>
          </div>
        </div>
        <div class="panel-section">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="prop-x">X</label>
              <input type="number" id="prop-x" class="form-input">
            </div>
            <div class="form-group">
              <label class="form-label" for="prop-y">Y</label>
              <input type="number" id="prop-y" class="form-input">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="prop-width">W</label>
              <input type="number" id="prop-width" class="form-input" min="20">
            </div>
            <div class="form-group">
              <label class="form-label" for="prop-height">H</label>
              <input type="number" id="prop-height" class="form-input" min="20">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="prop-font-size">Font</label>
            <input type="number" id="prop-font-size" class="form-input" min="6" max="64">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="prop-opacity">Opacity</label>
              <input type="number" id="prop-opacity" class="form-input" step="0.1" min="0.1" max="1.0">
            </div>
            <div class="form-group">
              <label class="form-label" for="prop-layer">Z</label>
              <input type="number" id="prop-layer" class="form-input" min="0" max="100">
            </div>
          </div>
        </div>
        <div class="panel-actions">
          <button id="prop-duplicate" class="btn" style="flex:1">DUPE</button>
          <button id="prop-delete" class="btn btn-danger">DEL</button>
        </div>
      </div>
    </aside>
  </main>

  <!-- ==========================================
       PAGE TABS
       ========================================== -->
  <footer class="page-tabs">
    <div id="page-tabs-list"></div>
    <button id="btn-add-page" class="page-tab-add">+</button>
  </footer>

  <!-- ==========================================
       MODAL: ADD CONTROL
       ========================================== -->
  <div id="modal-add-control" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">ADD CONTROL</span>
        <button class="modal-close">X</button>
      </div>
      <form id="form-add-control">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="add-name">Label</label>
            <input type="text" id="add-name" class="form-input" placeholder="A, B, X, Y..." required>
          </div>
          <div class="form-group">
            <label class="form-label" for="add-keybind">Key</label>
            <select id="add-keybind" class="form-select">
              <option value="">None</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="add-control-type">Type</label>
            <select id="add-control-type" class="form-select">
              <option value="button">Button</option>
              <option value="analog_stick">Analog Stick</option>
              <option value="trigger">Trigger</option>
            </select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="add-width">Width</label>
              <input type="number" id="add-width" class="form-input" value="60" min="20">
            </div>
            <div class="form-group">
              <label class="form-label" for="add-height">Height</label>
              <input type="number" id="add-height" class="form-input" value="60" min="20">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="add-opacity">Opacity</label>
              <input type="number" id="add-opacity" class="form-input" step="0.1" min="0.1" max="1" value="1.0">
            </div>
            <div class="form-group">
              <label class="form-label" for="add-layer">Z</label>
              <input type="number" id="add-layer" class="form-input" value="0" min="0" max="100">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn modal-cancel">CANCEL</button>
          <button type="submit" class="btn btn-primary">CREATE</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ==========================================
       MODAL: SETTINGS
       ========================================== -->
  <div id="modal-settings" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">SETTINGS</span>
        <button class="modal-close">X</button>
      </div>
      <div class="modal-body">
        <div class="settings-grid">
          <div class="settings-row">
            <span class="settings-label">Snap to Grid</span>
            <label class="form-toggle">
              <input type="checkbox" id="set-snap">
              <span class="toggle-track"></span>
            </label>
          </div>
          <div class="settings-row">
            <span class="settings-label">Show Grid</span>
            <label class="form-toggle">
              <input type="checkbox" id="set-grid">
              <span class="toggle-track"></span>
            </label>
          </div>
          <div class="settings-row">
            <span class="settings-label">Grid Size</span>
            <input type="number" id="set-grid-size" class="form-input" style="width:70px" min="5" max="100">
          </div>
          <div class="settings-row">
            <span class="settings-label">Haptic</span>
            <label class="form-toggle">
              <input type="checkbox" id="set-haptic">
              <span class="toggle-track"></span>
            </label>
          </div>
          <div class="settings-row">
            <span class="settings-label">Auto-Save</span>
            <label class="form-toggle">
              <input type="checkbox" id="set-autosave">
              <span class="toggle-track"></span>
            </label>
          </div>
          <div class="toolbar-divider" style="width:100%;height:1px;background:var(--border);margin:8px 0;"></div>
          <div class="settings-row">
            <span class="settings-label">Layout</span>
            <div style="display:flex;gap:8px;">
              <button id="btn-export-layout" class="btn btn-sm">EXPORT</button>
              <button id="btn-import-layout" class="btn btn-sm btn-primary">IMPORT</button>
              <input type="file" id="input-import-file" class="hidden" accept=".json">
            </div>
          </div>
          <div class="settings-row">
            <span class="settings-label">Display</span>
            <button id="btn-fullscreen" class="btn btn-sm" style="width:100px">FULLSCREEN</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary modal-close">DONE</button>
      </div>
    </div>
  </div>

  <!-- Toast + Context Menu -->
  <div id="toast-container" class="toast-container"></div>
  <div id="ctx-menu" class="ctx-menu"></div>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
