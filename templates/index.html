<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GamePad &mdash; Virtual Controller</title>
  <meta name="description" content="Turn any mobile device into a gamepad controller.">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <div id="screen-gamepad" class="screen-gamepad">

    <header class="toolbar">
      <div class="toolbar-brand">
        <span class="logo">GAMEPAD</span>
      </div>
      <div id="device-info" class="device-info hidden">
        <span id="device-name-display" class="device-name-text"></span>
        <span id="device-status" class="device-status"></span>
      </div>
      <div id="connection-badge" class="connection-badge disconnected">
        <span class="connection-text">OFF</span>
        <span id="latency-value" class="latency-badge">--</span>
      </div>
      <div class="toolbar-spacer"></div>
    </header>

    <button id="btn-cog" class="cog-btn">&#9881;</button>

    <main class="workspace-container">
      <div id="workspace" class="workspace play-mode"></div>
    </main>

    <footer id="page-tabs" class="page-tabs">
      <div id="page-tabs-list"></div>
    </footer>

  </div>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
